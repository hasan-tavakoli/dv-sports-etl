# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_revenue_summary
    description: "Aggregated daily revenue summary from raw transaction data."
    columns:
      - name: revenue_date
        description: "The date of the transactions."
        tests:
          - not_null
      - name: total_daily_revenue
        description: "The sum of all revenue amounts for the given date."