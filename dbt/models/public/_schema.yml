# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_active_users
    description: "Aggregated count of unique daily active users for the sports domain."
    columns:
      - name: event_date
        description: "The date of the user activity."
        tests:
          - not_null
      - name: daily_active_users
        description: "The total count of unique users who performed an action on this date."
        tests:
          - not_null