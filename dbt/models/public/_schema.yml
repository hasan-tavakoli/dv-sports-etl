# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_active_users
    description: "Aggregated daily active users for the sports domain based on event data."
    columns:
      - name: event_date
        description: "The date of the activity."
        tests:
          - not_null
      - name: active_user_count
        description: "The count of unique users who performed an action on that day."
        tests:
          - not_null