# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_revenue_summary
    description: "Aggregates total revenue on a daily basis from raw transaction data."
    columns:
      - name: revenue_date
        description: "The date of the transactions."
        tests:
          - unique
          - not_null
      - name: total_daily_revenue
        description: "The sum of all transaction amounts for the given date."
        tests:
          - not_null