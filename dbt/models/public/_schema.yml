# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: avg_events_per_user
    description: "Computes the average event value per user based on raw sports event data."
    columns:
      - name: user_id
        description: "Unique identifier for the user."
        tests:
          - not_null
      - name: average_event_value
        description: "The calculated average event value for the user."