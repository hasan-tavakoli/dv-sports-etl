# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_revenue_summary
    description: "Computes total daily revenue aggregated from raw transaction source data."
    columns:
      - name: revenue_date
        description: "The date of the transactions."
        tests:
          - unique
          - not_null
      - name: total_daily_revenue
        description: "The sum of transaction amounts for the given day."
      - name: transaction_count
        description: "The total number of transactions recorded for the given day."