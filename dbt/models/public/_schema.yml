# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_revenue_summary
    description: "Aggregated daily revenue and active user count from raw transactions."
    columns:
      - name: revenue_date
        description: "The date of the transaction."
        tests:
          - not_null
      - name: total_daily_revenue
        description: "Sum of all transaction amounts for the given day."
      - name: daily_active_users
        description: "Count of unique users who performed a transaction on the given day."