# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: stg_sports_clean
    description: "Cleaned sports staging data. Replaces old staging table to ensure data quality and schema consistency."
    columns:
      - name: sports_id
        description: "Unique identifier for the sports event."
        tests:
          - unique
          - not_null
      - name: event_name
        description: "Name of the sporting event."
      - name: event_timestamp
        description: "The scheduled start time of the event."
      - name: venue_location
        description: "The physical location or stadium where the event takes place."
      - name: processed_at
        description: "Timestamp when the record was processed by dbt."