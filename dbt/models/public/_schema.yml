# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_active_customers
    description: "Daily count of distinct active customers based on game activity."
    columns:
      - name: activity_date
        description: "The date of the game activity."
        tests:
          - not_null
      - name: daily_active_customer_count
        description: "The number of unique customers active on the given date."