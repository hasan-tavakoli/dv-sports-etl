# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_active_users
    description: "Aggregated daily active users for the sports domain based on raw event logs."
    columns:
      - name: activity_date
        description: "The date of the user activity."
        tests:
          - not_null
      - name: daily_active_users
        description: "The count of unique users active on the given date."
        tests:
          - not_null