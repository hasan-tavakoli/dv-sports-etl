# filepath: dbt/models/public/_schema.yml
version: 2

models:
  - name: daily_active_users
    description: "Aggregated daily active users for the sports domain based on raw event logs."
    columns:
      - name: event_date
        description: "The date of the activity."
        tests:
          - not_null
      - name: daily_active_users
        description: "The count of unique users who performed an action on that date."
        tests:
          - not_null